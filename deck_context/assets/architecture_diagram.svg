<svg viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- legend -->
  <rect x="20" y="20" width="18" height="18" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="46" y="34" font-size="15" fill="#1e293b">MiniMax-M3  (planning roles, in Mixed)</text>
  <rect x="360" y="20" width="18" height="18" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="386" y="34" font-size="15" fill="#1e293b">Qwen3.6-27B  (coding / testing roles, in Mixed)</text>
  <rect x="760" y="20" width="18" height="18" rx="4" fill="#f1f5f9" stroke="#64748b"/>
  <text x="786" y="34" font-size="15" fill="#1e293b">Deterministic node (no LLM)</text>
  <line x1="980" y1="29" x2="1010" y2="29" stroke="#b45309" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowLoop)"/>
  <text x="1016" y="34" font-size="15" fill="#1e293b">loop</text>

  <text x="590" y="70" font-size="22" font-weight="bold" text-anchor="middle" fill="#0f172a">MASS — Multi-Agent Software-Generation Graph (LangGraph)</text>

  <!-- node style helper via repeated rects -->
  <!-- Row 1: planning -->
  <g>
    <rect x="40" y="100" width="170" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="125" y="128" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Requirement</text>
    <text x="125" y="146" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Analyzer</text>

    <rect x="250" y="100" width="170" height="64" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="335" y="128" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Benchmark</text>
    <text x="335" y="146" font-size="14" font-weight="bold" text-anchor="middle" fill="#334155">Contract</text>

    <rect x="460" y="100" width="170" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="545" y="136" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Architect</text>

    <rect x="670" y="100" width="180" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="760" y="128" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Planning</text>
    <text x="760" y="146" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e3a8a">Reviewer</text>
  </g>

  <!-- edges row1 -->
  <line x1="210" y1="132" x2="248" y2="132" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="420" y1="132" x2="458" y2="132" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="630" y1="132" x2="668" y2="132" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- planning loop back -->
  <path d="M760,164 C760,200 545,200 545,166" fill="none" stroke="#b45309" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowLoop)"/>
  <text x="652" y="196" font-size="12" fill="#b45309" text-anchor="middle">planning loop (changes requested)</text>

  <!-- Coder -->
  <rect x="460" y="250" width="190" height="70" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="555" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#166534">Coder</text>
  <text x="555" y="300" font-size="11" text-anchor="middle" fill="#166534">JSON payload  |  agentic tool/ReAct loop</text>
  <!-- approved planning -> coder -->
  <path d="M760,164 C760,210 600,215 575,248" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="234" font-size="12" fill="#475569">approved → coder</text>

  <!-- verification chain row -->
  <rect x="40" y="400" width="160" height="62" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="120" y="428" font-size="13" font-weight="bold" text-anchor="middle" fill="#334155">Static</text>
  <text x="120" y="446" font-size="13" font-weight="bold" text-anchor="middle" fill="#334155">Analysis</text>
  <text x="120" y="475" font-size="10" text-anchor="middle" fill="#64748b">blocking</text>

  <rect x="240" y="400" width="160" height="62" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="320" y="428" font-size="13" font-weight="bold" text-anchor="middle" fill="#166534">Test Writer</text>
  <text x="320" y="446" font-size="12" text-anchor="middle" fill="#166534">dynamic pytest</text>
  <text x="320" y="475" font-size="10" text-anchor="middle" fill="#64748b">advisory</text>

  <rect x="440" y="400" width="170" height="62" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="525" y="428" font-size="13" font-weight="bold" text-anchor="middle" fill="#166534">Browser Test Writer</text>
  <text x="525" y="446" font-size="12" text-anchor="middle" fill="#166534">Selenium (websites)</text>
  <text x="525" y="475" font-size="10" text-anchor="middle" fill="#64748b">advisory</text>

  <rect x="650" y="400" width="160" height="62" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="730" y="436" font-size="15" font-weight="bold" text-anchor="middle" fill="#166534">Reviewer</text>

  <rect x="860" y="400" width="160" height="62" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
  <text x="940" y="436" font-size="15" font-weight="bold" text-anchor="middle" fill="#334155">Finalizer</text>

  <!-- coder down to static -->
  <path d="M460,300 C300,330 120,350 120,398" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- chain edges -->
  <line x1="200" y1="431" x2="238" y2="431" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="431" x2="438" y2="431" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="431" x2="648" y2="431" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="810" y1="431" x2="858" y2="431" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="835" y="422" font-size="11" fill="#475569" text-anchor="middle">approved</text>

  <!-- coding/repair loop reviewer -> coder -->
  <path d="M700,398 C700,350 640,335 600,322" fill="none" stroke="#b45309" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrowLoop)"/>
  <text x="690" y="356" font-size="12" fill="#b45309">coding / repair loop</text>
  <text x="690" y="372" font-size="11" fill="#b45309">(changes requested → coder)</text>

  <!-- finalizer output -->
  <rect x="860" y="510" width="160" height="50" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="1.5"/>
  <text x="940" y="532" font-size="12" font-weight="bold" text-anchor="middle" fill="#9a3412">final_report.json</text>
  <text x="940" y="549" font-size="11" text-anchor="middle" fill="#9a3412">verified runnable project</text>
  <line x1="940" y1="462" x2="940" y2="508" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- shared state band -->
  <rect x="40" y="600" width="980" height="86" rx="10" fill="#fafafa" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="530" y="624" font-size="14" font-weight="bold" text-anchor="middle" fill="#0f172a">Shared GraphState  ·  Checkpoints (resume)  ·  Agent transcripts (token usage)  ·  Bounded iteration caps</text>
  <text x="530" y="650" font-size="12" text-anchor="middle" fill="#475569">requirements · architecture_plan · benchmark_contract · reviewer_feedback · lint/static/dynamic/browser results · iteration counters</text>
  <text x="530" y="672" font-size="12" text-anchor="middle" fill="#475569">Every node snapshots state before running; every model call is persisted with its token usage.</text>
</svg>
